version: "3"

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    build: ./backend/
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/static
      - media:/media
  frontend:
    env_file: .env
    build: ./frontend/
    command: sh -c "cp /app/build/index.html /static/ && cp -r /app/build/static/* /static/"
    volumes:
      - static:/static
  gateway:
    build: ./nginx/
    env_file: .env
    depends_on:
      - backend
    ports:
      - 9000:80
    volumes:
      - static:/static
      - media:/media
